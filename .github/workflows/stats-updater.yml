name: 📊 Dynamic Stats Updater

on:
  schedule:
    - cron: "0 */4 * * *"
  push:
    branches: [main, master]
    paths:
      - '**.js'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Update Repository Stats
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Calculate Metrics (FIXED)
      - name: 📈 Calculate Code Metrics
        id: metrics
        run: |
          JS_FILES=$(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" | wc -l)

          TOTAL_LINES=$(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" -exec wc -l {} + 2>/dev/null | awk '{sum += $1} END {print sum+0}')

          PLUGIN_CJS=$(find ./Plugins-CJS -name "*.js" 2>/dev/null | wc -l)
          PLUGIN_ESM=$(find ./Plugins-ESM -name "*.js" 2>/dev/null | wc -l)

          if [ -f package.json ]; then
            DEPS=$(jq '.dependencies | length' package.json 2>/dev/null || echo "0")
          else
            DEPS=0
          fi

          LAST_COMMIT=$(git log -1 --format=%cd --date=short 2>/dev/null || echo "N/A")
          COMMITS=$(git rev-list --count HEAD 2>/dev/null || echo "0")

          {
            echo "JS_FILES=$JS_FILES"
            echo "TOTAL_LINES=$TOTAL_LINES"
            echo "PLUGIN_CJS=$PLUGIN_CJS"
            echo "PLUGIN_ESM=$PLUGIN_ESM"
            echo "DEPS=$DEPS"
            echo "LAST_COMMIT=$LAST_COMMIT"
            echo "COMMITS=$COMMITS"
          } >> $GITHUB_ENV

      # 3. Generate JSON Stats
      - name: 📝 Update Stats File
        run: |
          mkdir -p .github/stats

          cat > .github/stats/metrics.json << EOF
          {
            "repository": "${{ github.repository }}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "metrics": {
              "javascript_files": $JS_FILES,
              "total_lines": $TOTAL_LINES,
              "plugins_cjs": $PLUGIN_CJS,
              "plugins_esm": $PLUGIN_ESM,
              "dependencies": $DEPS,
              "total_commits": $COMMITS,
              "last_commit": "$LAST_COMMIT"
            }
          }
          EOF

      # 4. Update README (SAFE VERSION)
      - name: 🔄 Update README Stats Section
        run: |
          SECTION=$(cat <<EOF
<!-- STATS-START -->
## 📊 Live Repository Stats

<div align="center">

| Metric | Value |
|--------|-------|
| 📁 JavaScript Files | **$JS_FILES** |
| 📝 Total Lines | **$TOTAL_LINES** |
| 🔌 CJS Plugins | **$PLUGIN_CJS** |
| ⚡ ESM Plugins | **$PLUGIN_ESM** |
| 📦 Dependencies | **$DEPS** |
| 🔄 Total Commits | **$COMMITS** |
| 📅 Last Update | **$LAST_COMMIT** |

</div>

<sub>⏰ Auto-updated every 4 hours</sub>
<!-- STATS-END -->
EOF
)

          if grep -q "<!-- STATS-START -->" README.md; then
            awk '
              /<!-- STATS-START -->/ {print ENVIRON["SECTION"]; skip=1}
              /<!-- STATS-END -->/ {skip=0; next}
              !skip {print}
            ' README.md > README.tmp && mv README.tmp README.md
          else
            echo "$SECTION" >> README.md
          fi

      # 5. Commit Changes (SAFE)
      - name: 💾 Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/stats/metrics.json README.md

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "📊 Auto update stats"
          git push

      # 6. Summary
      - name: 📋 Summary
        run: |
          echo "## Stats Updated ✅" >> $GITHUB_STEP_SUMMARY
          echo "- JS Files: $JS_FILES" >> $GITHUB_STEP_SUMMARY
          echo "- Lines: $TOTAL_LINES" >> $GITHUB_STEP_SUMMARY
          echo "- Plugins: $PLUGIN_CJS + $PLUGIN_ESM" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: $DEPS" >> $GITHUB_STEP_SUMMARY
          echo "- Commits: $COMMITS" >> $GITHUB_STEP_SUMMARY

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: update-stats
    if: always()

    steps:
      - name: Final Status
        run: |
          if [ "${{ needs.update-stats.result }}" = "success" ]; then
            echo "✅ Success"
          else
            echo "❌ Failed"
            exit 1
          fi
